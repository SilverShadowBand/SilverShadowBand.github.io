    <script>
        let currentFileIdx = 1;
        
        function triggerPsychologicalEvent() {
            const frame = document.getElementById('psycho-deck');
            
            // ISOLATED BREAKTHROUGH TARGETING: Page 3 completely breaks out of the iframe environment and targets the main page directly
            if (currentFileIdx === 3) {
                window.location.href = "FUN3.html";
                return;
            }
            
            // Standard frame cycling execution loop paths
            frame.src = "FUN" + currentFileIdx + ".html";
            
            currentFileIdx++;
            if(currentFileIdx > 5) { currentFileIdx = 1; }
        }

        // MOBILE MELT ROUTER HANDSHAKE: Listens for authorization from FUN1.html and calculates screenshot matrices natively
        window.addEventListener('message', (event) => {
            if (event.data === 'initiateMelt') {
                const canvas = document.getElementById('psycho-canvas');
                const ctx = canvas.getContext('2d');
                const mainTerminal = document.getElementById('terminal-body');

                html2canvas(mainTerminal, { backgroundColor: '#000000', logging: false }).then(capturedCanvas => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    canvas.style.display = "block";
                    
                    const columns = [];
                    for (let i = 0; i < canvas.width; i += 2) {
                        columns.push({ x: i, y: 0, speed: Math.random() * 5 + 2, delay: Math.random() * 25 });
                    }

                    function melt() {
                        columns.forEach(c => {
                            if (c.delay-- <= 0) {
                                ctx.drawImage(capturedCanvas, c.x, 0, 2, canvas.height, c.x, c.y, 2, canvas.height);
                                c.y += c.speed;
                            }
                        });
                        requestAnimationFrame(melt);
                    }
                    melt();
                });
            }
        });
    </script>
