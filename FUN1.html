<!DOCTYPE html>
<html>
<head>
    <title>SILVER SHADOW</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000000;
        }
        canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        }
        .terminal-anchor {
            position: fixed; top: 15px; left: 15px; z-index: 999999; text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- RETRO TERMINAL CORE RETURN ANCHOR LINK -->
    <a href="index.html" class="terminal-anchor">
        <font face="Courier New, Courier, monospace" color="#FF0000" size="2">
            <b>[ BACK ]</b>
        </font>
    </a>

    <!-- Core graphics melter workspace array -->
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // SEAMLESS STEP: Vector-clones your index.html console layout onto the black backdrop canvas
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Render wide top marquee frame layout clone
        ctx.fillStyle = "#000000";
        ctx.strokeStyle = "#0000FF";
        ctx.lineWidth = 2;
        const marW = canvas.width * 0.70;
        const marX = (canvas.width - marW) / 2;
        ctx.fillRect(marX, 180, marW, 35);
        ctx.strokeRect(marX, 180, marW, 35);

        // Render center deep blue content box table layout clone
        ctx.fillStyle = "#000022";
        ctx.strokeStyle = "#FF0000";
        ctx.lineWidth = 6;
        const boxW = Math.min(canvas.width * 0.50, 500);
        const boxX = (canvas.width - boxW) / 2;
        ctx.fillRect(boxX, 260, boxW, 120);
        ctx.strokeRect(boxX, 260, boxW, 120);

        // Re-draw matching logo headings and under construction markers
        ctx.fillStyle = "#FF0000";
        ctx.font = "bold 42px Times New Roman";
        ctx.textAlign = "center";
        ctx.fillText("SILVER SHADOW", canvas.width / 2, 105);
        
        ctx.fillStyle = "#0000FF";
        ctx.font = "14px Courier New";
        ctx.fillText("::: UNDER CONSTRUCTION :::", canvas.width / 2, 140);

        ctx.fillStyle = "#800080";
        ctx.font = "bold 24px Times New Roman";
        ctx.fillText("COMING SOON", canvas.width / 2, 330);

        // Step 2: Slice the procedural cloned display image data array
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const columns = [];
        for (let i = 0; i < canvas.width; i += 3) {
            columns.push({ x: i, y: 0, speed: Math.random() * 6 + 3, delay: Math.random() * 15 });
        }

        function meltAnimationLoop() {
            columns.forEach(c => {
                if (c.delay-- <= 0 && c.y < canvas.height) {
                    // Drags pixel arrays down your display viewport space
                    ctx.putImageData(imgData, 0, c.y, c.x, 0, 3, canvas.height);
                    c.y += c.speed;
                }
            });
            requestAnimationFrame(meltAnimationLoop);
        }
        
        // Triggers the liquify destruction effect seamlessly
        setTimeout(meltAnimationLoop, 150);
    </script>
</body>
</html>
