<!DOCTYPE html>
<html>
<head>
    <!-- Injects the script required to rip the main website GUI visually -->
    <script src="https://cloudflare.com"></script>
</head>
<body style="margin:0; overflow:hidden; background:transparent;">
    <canvas id="canvas" style="position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none;"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Pinpoints your main website body frame through the iframe window ceiling
        const mainTerminal = window.parent.document.getElementById('terminal-body');
        const hiddenDeck = window.parent.document.getElementById('psycho-deck');

        // Capture the live layout of your main index page instantly on click
        html2canvas(mainTerminal, { backgroundColor: '#000000', logging: false }).then(capturedCanvas => {
            
            // Forces the canvas overlay to perfectly match the viewer's screen bounds
            canvas.width = window.parent.innerWidth;
            canvas.height = window.parent.innerHeight;
            
            // Reveals the hidden overlay frame container on the parent index.html
            hiddenDeck.style.display = "block";
            
            const columns = [];
            // Cuts your live website screenshot into vertical 2-pixel wide glitch columns
            for (let i = 0; i < canvas.width; i += 2) {
                columns.push({ 
                    x: i, 
                    y: 0, 
                    speed: Math.random() * 5 + 2, // Slightly increased for a more aggressive tear
                    delay: Math.random() * 25 
                });
            }

            function melt() {
                columns.forEach(c => {
                    if (c.delay-- <= 0) {
                        // Draws and drags the sliced image slices downward over time
                        ctx.drawImage(capturedCanvas, c.x, 0, 2, canvas.height, c.x, c.y, 2, canvas.height);
                        c.y += c.speed;
                    }
                });
                requestAnimationFrame(melt);
            }
            
            // Fires the corruption sequence
            melt();
        });
    </script>
</body>
</html>
