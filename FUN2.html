<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM BREACH</title>
    <style>
        /* CSS stays inside this file but elements will be forced onto the parent canvas */
        .error-icon {
            position: absolute;
            width: 64px;
            height: 64px;
            background-image: url('error_icon.png');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 99999; /* Set ultra-high to float above your main tables and marquees */
        }
    </style>
</head>
<body style="margin:0; padding:0; background:transparent; overflow:hidden;">

    <script>
        // Locates the central style sheet room of your main index.html file
        const parentHead = window.parent.document.head;
        const parentBody = window.parent.document.body;

        // INFECTION STEP: Copies the CSS style rule from this file and injects it straight into your main site header
        const styleLink = document.createElement('style');
        styleLink.innerHTML = `
            .error-icon {
                position: absolute;
                width: 64px;
                height: 64px;
                background-image: url('error_icon.png');
                background-size: contain;
                background-repeat: no-repeat;
                pointer-events: none;
                z-index: 99999;
            }
        `;
        parentHead.appendChild(styleLink);

        function spawnIcon() {
            // Creates the glitched division tag element
            const icon = window.parent.document.createElement('div');
            icon.className = 'error-icon';
            
            // Calculates coordinates based on the user's entire desktop browser window sizing dimensions
            const x = Math.random() * (window.parent.innerWidth - 64);
            const y = Math.random() * (window.parent.innerHeight - 64);
            
            icon.style.left = x + 'px';
            icon.style.top = y + 'px';
            
            // Appends the raw asset onto your primary website viewport layout layer
            parentBody.appendChild(icon);
            
            // Rapidly schedules the next system warning generation cycle
            setTimeout(spawnIcon, Math.random() * 200 + 50);
        }

        // Commences system crash loop instantly upon file connection initialization
        window.onload = spawnIcon;
    </script>
</body>
</html>
